<ion-content [fullscreen]="true" class="login-content">
  <div class="login-container">
    <div class="header-section">
      <h1>Üdv újra!</h1>
      <p class="subtitle">Jelentkezz be, hogy folytasd az öko utad!</p>
    </div>

    <div class="items">
      <div class="custom-input-group">
        <label class="custom-label">E-mail</label>
        <div class="input-wrapper">
          <ion-icon name="person"></ion-icon>
          <ion-input
            type="email"
            placeholder="e-mail"
            [(ngModel)]="email"
            autocomplete="email"
            inputmode="email"
            required="true"
          ></ion-input>
        </div>
      </div>

      <div class="custom-input-group">
        <label class="custom-label">Jelszó</label>
        <div class="input-wrapper">
          <ion-icon name="lock-closed"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="jelszó"
            [(ngModel)]="password"
            autocomplete="current-password"
            required="true"
            (keyup.enter)="login()"
          ></ion-input>
          <button class="toggle-password" (click)="togglePassword()">
            <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
          </button>
        </div>
      </div>
    </div>

    <div class="form-footer">
      <div class="remember-me">
        <ion-checkbox [(ngModel)]="rememberMe"></ion-checkbox>
        <label>Emlékezz rám</label>
      </div>
      <a class="forgot-password">Elfelejtett jelszó?</a>
    </div>

    @if (errorMessage) {
      <p class="error-msg">{{ errorMessage }}</p>
    }

    <ion-button expand="block" class="login-button" (click)="login()" [disabled]="isLoading">
      @if (isLoading) {
        <ion-spinner name="crescent"></ion-spinner>
      } @else {
        Bejelentkezés
      }
    </ion-button>

    <div class="switch-page-container">
      <p class="switch-page-text">
        Nincs még fiókod? <a routerLink="/register" class="highlight-link">Regisztrálj!</a>
      </p>
    </div>
  </div>
</ion-content>
