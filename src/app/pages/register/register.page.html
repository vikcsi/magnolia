<ion-content [fullscreen]="true" class="login-content">
  <div class="login-container">
    <div class="header-section">
      <h1>Csatlakozz!</h1>
      <p class="subtitle">Indítsd el a fenntartható utazásod.</p>
    </div>

    <div class="items">
      <div class="custom-input-group">
        <label class="custom-label">Felhasználónév</label>
        <div class="input-wrapper">
          <ion-icon name="person"></ion-icon>
          <ion-input
            type="text"
            placeholder="felhasználónév"
            [(ngModel)]="username"
            required
          ></ion-input>
        </div>
      </div>

      <div class="custom-input-group">
        <label class="custom-label">E-mail</label>
        <div class="input-wrapper">
          <ion-icon name="mail"></ion-icon>
          <ion-input
            type="email"
            placeholder="e-mail"
            [(ngModel)]="email"
            autocomplete="email"
            inputmode="email"
            required
          ></ion-input>
        </div>
      </div>

      <div class="custom-input-group">
        <label class="custom-label">Jelszó</label>
        <div class="input-wrapper">
          <ion-icon name="lock-closed"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="min. 6 karakter"
            [(ngModel)]="password"
            autocomplete="new-password"
            required
            (keyup.enter)="register()"
          ></ion-input>
          <button class="toggle-password" (click)="togglePassword()">
            <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
          </button>
        </div>
      </div>
    </div>

    <div class="goals-section">
      <label class="custom-label">Válassz 1-2 kezdeti célt! (opcionális)</label>
      <div class="goals-scroll">
        @for (goal of availableGoals; track goal.id) {
        <div
          class="goal-chip"
          [class.selected]="selectedGoalIds.includes(goal.id)"
          (click)="toggleGoal(goal.id)"
        >
          <ion-icon name="leaf"></ion-icon>
          <span>{{ goal.title }}</span>
        </div>
        }
      </div>
    </div>

    @if (errorMessage) {
    <p class="error-msg">{{ errorMessage }}</p>
    }

    <ion-button
      expand="block"
      class="login-button"
      (click)="register()"
      [disabled]="isLoading"
    >
      @if (isLoading) {
      <ion-spinner name="crescent"></ion-spinner>
      } @else { Regisztráció }
    </ion-button>

    <div class="switch-page-container">
      <p class="switch-page-text">
        Már van fiókod?
        <a routerLink="/login" class="highlight-link">Jelentkezz be!</a>
      </p>
    </div>
  </div>
</ion-content>
